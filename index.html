<!DOCTYPE html>
<html>
<head>
  <title>Inventory System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7f6;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 40px;
      color: #2c3e50;
    }

    .btn {
      display: block;
      width: 260px;
      margin: 20px auto;
      padding: 18px;
      font-size: 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    .withdraw {
      background: #27ae60;
      color: white;
    }

    .withdraw:hover {
      background: #219150;
    }

    .return {
      background: #3498db;
      color: white;
    }

    .return:hover {
      background: #2c80b4;
    }
  </style>
</head>

<body>

<h1>Inventory System</h1>

<button class="btn withdraw" onclick="location.href='withdraw.html'">
  Withdraw Item
</button>

<button class="btn return" onclick="location.href='return.html'">
  Return Item
</button>

</body>
</html>
