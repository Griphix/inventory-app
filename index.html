<!DOCTYPE html>
<html>
<head>
  <title>Inventory Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #eef2f3;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .item {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .low {
      color: red;
      font-weight: bold;
    }

    button {
      padding: 12px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .withdraw { background: #27ae60; color: white; }
    .return { background: #3498db; color: white; }

    .actions {
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">

<h1>Inventory Dashboard</h1>

<select id="categoryFilter" onchange="filterItems()">
  <option value="">All Categories</option>
</select>

<div class="card">
  <h3>Stock</h3>
  <div id="inventoryList"></div>
</div>

<div class="card">
  <h3>Recent Activity</h3>
  <ul id="logList"></ul>
</div>

<div class="actions">
  <button class="withdraw" onclick="location.href='withdraw.html'">Withdraw</button>
  <button class="return" onclick="location.href='return.html'">Return</button>
</div>

</div>

<script src="main.js"></script>

</body>
</html>
