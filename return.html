<!DOCTYPE html>
<html>
<head>
  <title>Return</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #eef2f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 { text-align: center; }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Return Item</h2>

  <input id="name" placeholder="Your Name">
  <select id="itemSelect"></select>
  <input id="qty" type="number" placeholder="Quantity">

  <button onclick="submitReturn()">Submit</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwEOfunJbNCn2ZUoEc9rDxuWYOuhSseDCUcgw_kr0qFOHUdPAtiPzx1xEB9BL4Xpu_y/exec";

async function loadItems() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const select = document.getElementById("itemSelect");
  select.innerHTML = "";

  data.inventory.forEach(i => {
    const opt = document.createElement("option");
    opt.value = i.name;
    opt.textContent = `${i.name} (${i.qty})`;
    select.appendChild(opt);
  });
}

async function submitReturn() {
  const name = document.getElementById("name").value;
  const item = document.getElementById("itemSelect").value;
  const qty = document.getElementById("qty").value;

  if (!name || !item || !qty) return alert("Fill all fields");

  const url = `${API_URL}?action=return&name=${encodeURIComponent(name)}&item=${encodeURIComponent(item)}&qty=${qty}`;

  await fetch(url);

  alert("Return successful!");
  location.href = "index.html";
}

window.onload = loadItems;
</script>

</body>
</html>
