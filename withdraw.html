<!DOCTYPE html>
<html>
<head>
  <title>Withdraw Items</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #eef2f3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 16px;
      width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-size: 13px;
      color: #666;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .item-row {
      border: 1px solid #eee;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .add { background: #f1c40f; }
    .submit { background: #27ae60; color: white; }
  </style>
</head>

<body>

<div class="card">
  <h2>Withdraw Items</h2>

  <label>Name</label>
  <input id="name">

  <div id="itemsContainer"></div>

  <button class="add" onclick="addRow()">+ Add Item</button>
  <button class="submit" onclick="submitAll()">Submit All</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwEOfunJbNCn2ZUoEc9rDxuWYOuhSseDCUcgw_kr0qFOHUdPAtiPzx1xEB9BL4Xpu_y/exec";

let inventory = [];

async function loadItems() {
  const res = await fetch(API_URL);
  const data = await res.json();
  inventory = data.inventory;

  addRow();
}

function addRow() {
  const container = document.getElementById("itemsContainer");

  const div = document.createElement("div");
  div.className = "item-row";

  let options = inventory.map(i =>
    `<option value="${i.name}">${i.name} (${i.qty})</option>`
  ).join("");

  div.innerHTML = `
    <select class="item">${options}</select>
    <input type="number" class="qty" placeholder="Quantity">
  `;

  container.appendChild(div);
}

async function submitAll() {
  const name = document.getElementById("name").value;

  if (!name) {
    alert("Enter name");
    return;
  }

  const rows = document.querySelectorAll(".item-row");

  for (let row of rows) {
    const item = row.querySelector(".item").value;
    const qty = row.querySelector(".qty").value;

    if (!qty) continue;

    const url = `${API_URL}?action=withdraw&name=${encodeURIComponent(name)}&item=${encodeURIComponent(item)}&qty=${qty}`;
    await fetch(url);
  }

  alert("All items withdrawn!");
  window.location.href = "index.html";
}

window.onload = loadItems;
</script>

</body>
</html>
