<!DOCTYPE html>
<html>
<head>
  <title>Withdraw Item</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #eef2f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
    }

    h2 { text-align: center; }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #27ae60;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Withdraw</h2>

  <input id="name" placeholder="Your Name">

  <select id="itemSelect">
    <option>Loading items...</option>
  </select>

  <input id="qty" type="number" placeholder="Quantity">

  <button onclick="submitWithdraw()">Submit</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwEOfunJbNCn2ZUoEc9rDxuWYOuhSseDCUcgw_kr0qFOHUdPAtiPzx1xEB9BL4Xpu_y/exec";

// LOAD ITEMS
async function loadItems() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const select = document.getElementById("itemSelect");
    select.innerHTML = "";

    data.inventory.forEach(i => {
      const opt = document.createElement("option");
      opt.value = i.name;
      opt.textContent = `${i.name} (${i.qty})`;
      select.appendChild(opt);
    });

  } catch (err) {
    console.error(err);
    alert("Cannot load data");
  }
}

// SUBMIT WITHDRAW
async function submitWithdraw() {
  const name = document.getElementById("name").value;
  const item = document.getElementById("itemSelect").value;
  const qty = parseInt(document.getElementById("qty").value);

  if (!name || !item || !qty) {
    alert("Fill all fields");
    return;
  }

  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "withdraw",
        name,
        item,
        qty
      })
    });

    alert("Withdraw successful!");
    location.href = "index.html";

  } catch (err) {
    console.error(err);
    alert("Error submitting withdraw");
  }
}

window.onload = loadItems;
</script>

</body>
</html>
