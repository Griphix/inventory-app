<!DOCTYPE html>
<html>
<head>
  <title>Withdraw</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #eef2f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px 25px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      font-size: 13px;
      color: #666;
      margin-top: 12px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #27ae60;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border-radius: 12px;
      border: none;
      background: #27ae60;
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #219150;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Withdraw Item</h2>

  <label>Your Name</label>
  <input id="name">

  <label>Select Item</label>
  <select id="itemSelect"></select>

  <label>Quantity</label>
  <input id="qty" type="number">

  <button onclick="submitWithdraw()">Withdraw</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwEOfunJbNCn2ZUoEc9rDxuWYOuhSseDCUcgw_kr0qFOHUdPAtiPzx1xEB9BL4Xpu_y/exec";

async function loadItems() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const select = document.getElementById("itemSelect");
    select.innerHTML = "";

    data.inventory.forEach(i => {
      const opt = document.createElement("option");
      opt.value = i.name;
      opt.textContent = `${i.name} (${i.qty})`;
      select.appendChild(opt);
    });

  } catch (err) {
    alert("Failed to load items");
  }
}

async function submitWithdraw() {
  const name = document.getElementById("name").value.trim();
  const item = document.getElementById("itemSelect").value;
  const qty = document.getElementById("qty").value;

  if (!name || !item || !qty) {
    alert("Fill all fields");
    return;
  }

  const url = `${API_URL}?action=withdraw&name=${encodeURIComponent(name)}&item=${encodeURIComponent(item)}&qty=${qty}`;

  try {
    await fetch(url);
    alert("Withdraw successful!");

    // 🔥 Force correct redirect (prevents weird jumping)
    window.location.href = "./index.html";

  } catch (err) {
    alert("Error submitting withdraw");
  }
}

window.onload = loadItems;
</script>

</body>
</html>
